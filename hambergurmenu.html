<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hammerburgermenu</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #dropdown-menu{
            background-color: gray;
            width: 100%;
            height: 150px;
        }

        #dropdown-menu ul {
            list-style: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }

        #dropdown-menu ul li{
            padding: 2px 24px;
        }

        #dropdown-menu ul li a{
            text-decoration: none;
        }

        #hambergurmenu:hover{
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="menu-container">
    <span id="hambergurmenu" class="material-symbols-outlined"> menu</span>
    <div id="dropdown-menu">
        <ul>
         <li><a href="#first-section">Home</a></li>
        <li><a href="#Second-section">About</a></li>
        <li><a href="#Third-section">Projects</a></li>
        <li><a href="#Fourth-section">Contact</a></li>
        </ul>
    </div>
</div>



    <script>

          let handleclicked=()=>{
            if (dropdown.style.display === "block"){
                dropdown.style.display = "none";
            } 
            else{
                 dropdown.style.display = "block";
                }
        }

        let dropdown = document.getElementById("dropdown-menu");
        dropdown.style.display="none";

        let menu = document.getElementById("hambergurmenu");
        menu.addEventListener("click",handleclicked);

        
        
    </script>
</body>
</html>
